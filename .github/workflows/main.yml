name: Build FPS Tracer Dylib

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Cho phép nhấn nút chạy thủ công trên GitHub

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Build Dylib for iOS (arm64)
      run: |
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)

        clang++ -dynamiclib -isysroot "$SDK_PATH" \
          -arch arm64 \
          -miphoneos-version-min=12.0 \
          -framework Foundation \
          -framework QuartzCore \
          -framework UIKit \
          -framework CoreGraphics \
          -lz \
          -o libFPSTracer.dylib \
          FPSTracer.mm
        
        echo "Build thành công dylib cho iOS Device (arm64)"
        
        echo "Build thành công dylib cho iOS Device (arm64)"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FPSTracer-Dylib
        path: libFPSTracer.dylib
